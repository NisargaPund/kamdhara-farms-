# Set in Netlify UI → Site configuration → Environment variables (required for build):
#   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, VITE_RAZORPAY_KEY_ID
# Optional: VITE_SITE_URL (your live site URL for auth email redirects)

[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
